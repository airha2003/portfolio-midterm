{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airha S. Obañana | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #040b14;
            --pink-soft: #ff85a2;
            --purple-vibrant: #9b5de5;
            --white-pure: #ffffff;
            --sidebar-width: 300px;
        }

        body {
            font-family: "Poppins", sans-serif;
            background-color: var(--bg-dark);
            overflow-x: hidden;
            color: var(--white-pure);
        }

        /* --- SIDEBAR STYLING --- */
        #header {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width)); /* Hidden by default */
            bottom: 0;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, rgba(4, 11, 20, 0.98) 0%, rgba(20, 10, 35, 0.98) 100%);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(155, 93, 229, 0.2);
            padding: 20px;
            z-index: 9997;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Reveal Sidebar */
        #header.active {
            left: 0;
        }

        /* --- MOBILE TOGGLE --- */
        .mobile-nav-toggle {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 9999;
            border: 0;
            font-size: 28px;
            transition: all 0.4s;
            outline: none !important;
            background-color: var(--purple-vibrant);
            color: #fff;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(155, 93, 229, 0.4);
            visibility: hidden; /* Only show after entering site */
            opacity: 0;
        }

        .mobile-nav-toggle.visible {
            visibility: visible;
            opacity: 1;
        }

        /* --- NAVIGATION --- */
        .profile { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .profile img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid var(--purple-vibrant);
            object-fit: cover; box-shadow: 0 0 20px rgba(155, 93, 229, 0.3);
        }

        .nav-menu { margin-top: 30px; }
        .nav-menu ul { list-style: none; padding: 0; }
        .nav-menu a {
            display: flex; align-items: center; color: #ced4da;
            padding: 12px 20px; text-decoration: none;
            transition: 0.3s; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-menu a i { font-size: 20px; margin-right: 15px; }

        /* Individual Nav Highlights */
        .nav-home:hover, .nav-home.active { background: rgba(255, 133, 162, 0.15); color: var(--pink-soft); }
        .nav-about:hover, .nav-about.active { background: rgba(155, 93, 229, 0.15); color: var(--purple-vibrant); }

        /* --- MAIN AREA --- */
        main {
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            min-height: 100vh;
        }

        /* Desktop Push Effect */
        @media (min-width: 992px) {
            main.pushed {
                margin-left: var(--sidebar-width);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 991px) {
            #header { width: 260px; }
            /* Overlay effect when menu is open on mobile */
            .mobile-nav-active { overflow: hidden; }
            .mobile-nav-active #header { left: 0; }
            .mobile-nav-active .mobile-nav-toggle { background-color: var(--pink-soft); }
        }
    </style>
</head>
<body>

    <button type="button" class="mobile-nav-toggle" id="nav-toggle">
        <i class="bi bi-list"></i>
    </button>

    <header id="header">
        <div class="profile">
            <img src="{% static 'portfolio/img/PROFILE2.png' %}" alt="Airha Profile">
            <h1 class="fs-5 mt-3">Airha S. Obañana</h1>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="{% url 'home' %}" class="nav-home active"><i class="bi bi-house-door"></i> <span>Home</span></a></li>
                <li><a href="{% url 'about' %}" class="nav-about"><i class="bi bi-person"></i> <span>About</span></a></li>
                <li><a href="{% url 'skills' %}" class="nav-skills"><i class="bi bi-code-slash"></i> <span>Skills</span></a></li>
                <li><a href="{% url 'resume' %}" class="nav-resume"><i class="bi bi-file-earmark-text"></i> <span>Resume</span></a></li>
                <li><a href="{% url 'portfolio' %}" class="nav-portfolio"><i class="bi bi-journal-richtext"></i> <span>Portfolio</span></a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /**
         * Sidebar Toggle Logic
         */
        const navToggle = document.getElementById('nav-toggle');
        const header = document.getElementById('header');
        const main = document.getElementById('main-content');
        const body = document.querySelector('body');

        function toggleMenu() {
            body.classList.toggle('mobile-nav-active');
            header.classList.toggle('active');
            main.classList.toggle('pushed');

            // Switch icons
            const icon = navToggle.querySelector('i');
            icon.classList.toggle('bi-list');
            icon.classList.toggle('bi-x');
        }

        navToggle.addEventListener('click', toggleMenu);

        /**
         * Global Enter Site Function
         * This can be called from your home page 'Explore Now' button
         */
        window.enterSite = function() {
            const overlay = document.getElementById('welcome-overlay');
            const hero = document.getElementById('hero');

            if(overlay) overlay.style.opacity = '0';

            setTimeout(() => {
                if(overlay) overlay.style.display = 'none';
                if(hero) {
                    hero.style.visibility = 'visible';
                    hero.style.opacity = '1';
                }

                // Show toggle button and slide sidebar
                navToggle.classList.add('visible');

                // Only auto-open sidebar on Desktop (wider than 991px)
                if (window.innerWidth > 991) {
                    header.classList.add('active');
                    main.classList.add('pushed');
                }
            }, 800);
        };
    </script>
</body>
</html>
