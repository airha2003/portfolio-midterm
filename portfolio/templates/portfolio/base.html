{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airha S. Obañana | Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #040b14;
            /* New Aesthetic Palette */
            --pink-soft: #ff85a2;
            --purple-vibrant: #9b5de5;
            --white-pure: #ffffff;
        }

        body {
            font-family: "Poppins", sans-serif;
            background-color: var(--bg-dark);
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        #header {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 300px;
            background: linear-gradient(180deg, rgba(4, 11, 20, 0.98) 0%, rgba(20, 10, 35, 0.98) 100%);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(155, 93, 229, 0.2);
            padding: 20px;
            z-index: 9997;
            display: flex;
            flex-direction: column;
        }

        /* Profile Section Centered */
        .profile {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--purple-vibrant);
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(155, 93, 229, 0.4);
        }

        .profile h1 {
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            color: var(--white-pure);
        }

        .social-links {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-links a {
            font-size: 18px;
            transition: 0.3s;
            color: #a8a9b4;
        }

        .social-links a:hover { color: var(--pink-soft); transform: translateY(-3px); }

        /* Nav Menu with Unique Colors */
        .nav-menu ul { list-style: none; padding: 0; }

        .nav-menu a {
            display: flex;
            align-items: center;
            color: #d1d1d1;
            padding: 12px 15px;
            text-decoration: none;
            transition: 0.4s;
            margin-bottom: 8px;
            border-radius: 12px;
            font-size: 15px;
            border: 1px solid transparent;
        }

        .nav-menu a i { font-size: 20px; margin-right: 12px; }

        /* Individual Shades (Pink, Purple, White combos) */
        /* Home - Pink Glow */
        .nav-home:hover, .nav-home.active {
            background: rgba(255, 133, 162, 0.15);
            color: var(--pink-soft);
            border-color: var(--pink-soft);
            box-shadow: 0 0 10px rgba(255, 133, 162, 0.2);
        }

        /* About - Purple Glow */
        .nav-about:hover, .nav-about.active {
            background: rgba(155, 93, 229, 0.15);
            color: var(--purple-vibrant);
            border-color: var(--purple-vibrant);
            box-shadow: 0 0 10px rgba(155, 93, 229, 0.2);
        }

        /* Skills - White/Pink Glow */
        .nav-skills:hover, .nav-skills.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white-pure);
            border-color: var(--white-pure);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Resume - Soft Magenta Mix */
        .nav-resume:hover, .nav-resume.active {
            background: rgba(255, 133, 162, 0.1);
            color: #ffb3c1;
            border-color: #ffb3c1;
        }

        /* Portfolio - Deep Purple Glow */
        .nav-portfolio:hover, .nav-portfolio.active {
            background: rgba(155, 93, 229, 0.2);
            color: #c8b6ff;
            border-color: #c8b6ff;
        }

        main {
            margin-left: 300px;
            min-height: 100vh;
            background: #fff;
            transition: 0.5s;
        }

        @media (max-width: 992px) {
            #header { left: -300px; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <header id="header">
        <div class="profile">
            <img src="{% static 'portfolio/img/PROFILE2.png' %}" alt="Airha Profile">
            <h1 class="fs-5">Airha S. Obañana</h1>
        </div>

        <nav class="nav-menu mt-2">
            <ul>
                <li><a href="{% url 'home' %}" class="nav-home {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <i class="bi bi-house-door"></i> <span>Home</span></a>
                </li>
                <li><a href="{% url 'about' %}" class="nav-about {% if request.resolver_match.url_name == 'about' %}active{% endif %}">
                    <i class="bi bi-person"></i> <span>About</span></a>
                </li>
                <li><a href="{% url 'skills' %}" class="nav-skills {% if request.resolver_match.url_name == 'skills' %}active{% endif %}">
                    <i class="bi bi-code-slash"></i> <span>Skills</span></a>
                </li>
                <li><a href="{% url 'resume' %}" class="nav-resume {% if request.resolver_match.url_name == 'resume' %}active{% endif %}">
                    <i class="bi bi-file-earmark-text"></i> <span>Resume</span></a>
                </li>
                <li><a href="{% url 'portfolio' %}" class="nav-portfolio {% if request.resolver_match.url_name == 'portfolio' %}active{% endif %}">
                    <i class="bi bi-journal-richtext"></i> <span>Portfolio</span></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
